<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 – Stránka nenalezena | BarX</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0b12;
      --card: #1c1829;
      --accent1: #c8a96e;
      --accent2: #7b3fff;
      --accent3: #ff4d6d;
      --text: #e8e0f0;
      --muted: #8b7fa3;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(123,63,255,.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 80%, rgba(255,77,109,.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }
    .glyph {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 18vw, 10rem);
      letter-spacing: .06em;
      line-height: .95;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      background-size: 300% 300%;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 6s ease infinite;
      margin-bottom: .5rem;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-block;
      padding: .85rem 2.4rem;
      border-radius: 50px;
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      color: #fff;
      box-shadow: 0 0 30px rgba(123,63,255,.4);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(123,63,255,.6);
    }
    .btn-secondary {
      background: rgba(255,255,255,.05);
      color: var(--text);
      border: 1px solid rgba(200,169,110,.25);
    }
    .btn-secondary:hover {
      transform: translateY(-3px);
      border-color: rgba(200,169,110,.5);
    }
    .btn:focus-visible {
      outline: 2px solid rgba(240, 201, 134, .95);
      outline-offset: 3px;
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 1.5rem;
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .06em;
      z-index: 1;
    }
    footer span { color: var(--accent1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="glyph">🍸</div>
    <h1>404</h1>
    <div class="subtitle">Stránka nenalezena</div>
    <p>Tenhle drink v menu nemáme. Možná se ztratil v koktejlovém shákru, nebo prostě nikdy neexistoval. Zkus to znovu od začátku.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Zpět na hlavní stránku</a>
      <a href="/#menu" class="btn btn-secondary">Prozkoumat menu</a>
    </div>
  </div>
  <footer>
    <p>© 2026 <span>BarX</span> · Craft Cocktail Bar · Praha</p>
  </footer>
</body>
</html>
